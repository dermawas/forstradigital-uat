  <polygon points="380,469 391,473.2 395,484 391,494.8 380,499 369,494.8 365,484 369,473.2" fill="#1a2744"/>
  <line x1="373" y1="475" x2="373" y2="493" stroke="white" stroke-width="2" stroke-linecap="round"/>
