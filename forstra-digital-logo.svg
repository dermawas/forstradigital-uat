  <polygon points="560,426 604,442.6 626,486 604,529.4 560,546 516,529.4 494,486 516,442.6" fill="#1f7ab5"/>
  <polygon points="560,437 596,451.1 614,486 596,520.9 560,535 524,520.9 506,486 524,451.1" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.8"/>
  <line x1="536" y1="464" x2="536" y2="510" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="536" y1="464" x2="556" y2="464" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="536" y1="486" x2="554" y2="486" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M564 510 Q586 510 586 498 Q586 486 564 486 Q542 486 542 474 Q542 462 564 462 Q582 462 584 470"
