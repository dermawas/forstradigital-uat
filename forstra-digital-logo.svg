  <polygon points="110,75 146,89.1 164,124 146,158.9 110,173 74,158.9 56,124 74,89.1" fill="none" stroke="rgba(31,122,181,0.5)" stroke-width="2"/>

  <!-- F letterform -->
  <line x1="84"  y1="100" x2="84"  y2="152" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="84"  y1="100" x2="110" y2="100" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="84"  y1="125" x2="106" y2="125" stroke="white" stroke-width="5" stroke-linecap="round"/>

