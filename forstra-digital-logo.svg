  <line x1="278" y1="464" x2="290" y2="464" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="278" y1="478" x2="288" y2="478" stroke="white" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M294 492 Q305 492 305 485.5 Q305 479 294 479 Q283 479 283 472.5 Q283 466 294 466 Q303 466 304 470"
