name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout UAT Repo
        uses: actions/checkout@v5

      - name: Push to Production Repo
        env:
          TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git clone https://x-access-token:${TOKEN}@github.com/dermawas/forstradigital.git production

          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'CNAME' \
            ./ production/

          cd production

          git add .
          git commit -m "Deploy from UAT" || echo "No changes to commit"

          git push origin main
